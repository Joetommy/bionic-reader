<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bionic Reader</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <header>
      <h1>Bionic Reader</h1>
    </header>
    <label class="row">
      <span>Enabled on this page</span>
      <input type="checkbox" id="enabled-toggle" />
    </label>
    <label class="row">
      <span>Fixation strength</span>
      <input type="range" id="ratio-slider" min="30" max="70" step="5" />
    </label>
    <p class="hint">Bolds the leading portion of each word so your eyes anchor faster while reading.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
