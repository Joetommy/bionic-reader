<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bionic Reader</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <header>
      <h1>Bionic Reader</h1>
    </header>

    <label class="row">
      <span id="site-label">Enabled on this site</span>
      <input type="checkbox" id="site-toggle" />
    </label>
    <button id="reset-site" class="link-button" hidden>Use default instead</button>

    <hr />

    <label class="row">
      <span>Enable on all sites by default</span>
      <input type="checkbox" id="global-toggle" />
    </label>

    <label class="row">
      <span>Fixation strength</span>
      <input type="range" id="ratio-slider" min="30" max="70" step="5" />
    </label>

    <p class="hint">Bolds the leading portion of each word so your eyes anchor faster while reading. The site toggle above only affects the page you're on; the default controls every other site.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
